in_upwind_alerts:
  type: collection
  ttl: 4h
  ignoreGroupJobsLimit: false
  removeFields: []
  resumeOnBoot: false
  schedule:
    cronSchedule: "*/5 * * * *"
    maxConcurrentRuns: 1
    skippable: true
    run:
      rescheduleDroppedTasks: true
      maxTaskReschedule: 1
      logLevel: info
      jobTimeout: 60m
      mode: run
      timeRangeType: relative
      timeWarning: {}
      expression: "true"
      minTaskSize: 1MB
      maxTaskSize: 10MB
      stateTracking:
        stateUpdateExpression: "__timestampExtracted !== false && {latestTime: (state.latestTime || 0) > _time ? state.latestTime : _time}"
        stateMergeExpression: "(prevState.latestTime || 0) > newState.latestTime ? prevState : newState"
        enabled: true
    enabled: false
  streamtags: []
  workerAffinity: false
  collector:
    conf:
      discovery:
        discoverType: none
      collectMethod: get
      pagination:
        type: response_body
        attribute:
          - nextPage
        maxPages: 100
      authentication: login
      loginUrl: "'https://auth.upwind.io/oauth/token'"
      loginBody: "`client_id=${C.vars['upwind_client_id']}&client_secret=${C.vars['upwind_client_secret']}&grant_type=client_credentials&audience=https://api.upwind.io`"
      tokenRespAttribute: access_token
      getAuthTokenFromHeader: false
      authHeaderKey: Authorization
      authHeaderExpr: "`Bearer ${token}`"
      timeout: 0
      useRoundRobinDns: false
      disableTimeFilter: false
      decodeUrl: false
      rejectUnauthorized: true
      captureHeaders: false
      stopOnEmptyResults: true
      safeHeaders: []
      retryRules:
        type: backoff
        interval: 1000
        limit: 5
        multiplier: 2
        maxIntervalMs: 20000
        codes:
          - 429
          - 503
        enableHeader: true
        retryConnectTimeout: false
        retryConnectReset: false
        retryHeaderName: retry-after
      __scheduling:
        stateTracking: {}
      collectUrl: "`https://api.upwind.io/v1/organizations/${C.vars['upwind_organization_id']}/alerts`"
      collectRequestParams:
        - name: from
          value: "`${C.Time.strftime(state.latestTime || Date.now()/1000 - 60*60*24*7, '%Y-%m-%dT%H:%M:%SZ')}`"
        - name: to
          value: "`${C.Time.strftime(latest || Date.now()/1000, '%Y-%m-%dT%H:%M:%SZ')}`"
        - name: limit
          value: "'500'"
      collectRequestHeaders:
        - name: Accept
          value: "'application/json'"
      username: SET_VARIABLE_INSTEAD
      password: SET_VARIABLE_INSTEAD
    destructive: false
    encoding: utf8
    type: rest
  input:
    type: collection
    staleChannelFlushMs: 10000
    sendToRoutes: true
    preprocess:
      disabled: true
    throttleRatePerSec: "0"
    breakerRulesets:
      - Upwind API Ruleset
    metadata:
      - name: __packsource
        value: "'cribl-upwind-rest-io.upwind-alerts'"
      - name: sourcetype
        value: "'upwind:alert'"
      - name: index
        value: C.vars['default_splunk_index']
  savedState: {}
  notifications: []
  description: "Collects security alerts from the Upwind Security platform every 5 minutes."
