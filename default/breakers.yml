Upwind API Ruleset:
  lib: custom
  minRawLength: 256
  rules:
    - condition: _raw.includes('"severity"') && _raw.includes('"alertId"')
      type: json_array
      timestampAnchorRegex: /createdAt/
      timestamp:
        type: auto
        length: 150
      timestampTimezone: UTC
      timestampEarliest: -420weeks
      timestampLatest: +1week
      maxEventBytes: 134217728
      disabled: false
      parserEnabled: false
      shouldUseDataRaw: false
      jsonExtractAll: false
      eventBreakerRegex: /[\n\r]+(?!\s)/
      name: Upwind Alerts
      jsonArrayField: data
    - condition: _raw.includes('"cveId"') || _raw.includes('"cvssScore"')
      type: json_array
      timestampAnchorRegex: /updatedAt/
      timestamp:
        type: auto
        length: 150
      timestampTimezone: UTC
      timestampEarliest: -420weeks
      timestampLatest: +1week
      maxEventBytes: 134217728
      disabled: false
      parserEnabled: false
      shouldUseDataRaw: false
      jsonExtractAll: false
      eventBreakerRegex: /[\n\r]+(?!\s)/
      name: Upwind Vulnerabilities
      jsonArrayField: data
    - condition: _raw.includes('"assetId"') || _raw.includes('"resourceType"')
      type: json_array
      timestampAnchorRegex: /lastSeen/
      timestamp:
        type: auto
        length: 150
      timestampTimezone: UTC
      timestampEarliest: -420weeks
      timestampLatest: +1week
      maxEventBytes: 134217728
      disabled: false
      parserEnabled: false
      shouldUseDataRaw: false
      jsonExtractAll: false
      eventBreakerRegex: /[\n\r]+(?!\s)/
      name: Upwind Inventory
      jsonArrayField: data
    - condition: "true"
      type: json_array
      timestampAnchorRegex: /timestamp|createdAt|updatedAt/
      timestamp:
        type: auto
        length: 150
      timestampTimezone: UTC
      timestampEarliest: -420weeks
      timestampLatest: +1week
      maxEventBytes: 134217728
      disabled: false
      parserEnabled: false
      shouldUseDataRaw: false
      jsonExtractAll: false
      eventBreakerRegex: /[\n\r]+(?!\s)/
      name: Upwind API Default
      jsonArrayField: data
  description: "Event breaking rules for the Upwind Security REST API. Handles alerts, vulnerabilities, inventory, threats, and identity data."
