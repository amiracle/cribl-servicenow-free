in_upwind_alerts:
  type: collection
  disabled: true
  sendToRoutes: true
  preprocess:
    disabled: true
  throttleRatePerSec: "0"
  breakerRulesets:
    - Upwind API Ruleset
  metadata:
    - name: __packsource
      value: "'cribl-upwind-rest-io.upwind-alerts'"
    - name: sourcetype
      value: "'upwind:alert'"
    - name: index
      value: C.vars['default_splunk_index']
